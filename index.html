<body>
<div id="app"></div>
<style>
:root{
  --ink:#1c2b2d;
  --paper:#f6f4ee;
  --line:#d8d2c2;
  --rust:#b5502f;
  --moss:#46624f;
  --amber:#c98a2c;
  --panel:#ffffff;
  --muted:#7a766a;
  font-family:'IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;}
body,#app{margin:0;padding:0;background:transparent;color:var(--ink);-webkit-text-size-adjust:100%;}
#app{max-width:880px;margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) 16px calc(80px + env(safe-area-inset-bottom));}

.hdr{border-bottom:3px solid var(--ink);padding-bottom:8px;margin-bottom:16px;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px 10px;}
.hdr h1{flex-shrink:0;font-size:17px;letter-spacing:.03em;text-transform:uppercase;margin:0;font-weight:800;white-space:nowrap;}
.hdr-sync{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.02em;white-space:nowrap;flex-shrink:0;}
.hdr-status{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;margin-top:6px;}
.hdr-status .who{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.hdr-status button{font-size:10px;color:var(--muted);background:none;border:1px solid var(--line);border-radius:4px;padding:4px 7px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;flex-shrink:0;}

.tabs{display:flex;gap:8px;margin-bottom:18px;}
.tab{flex:1;padding:13px 10px;text-align:center;border:2px solid var(--ink);background:var(--panel);font-weight:700;letter-spacing:.03em;text-transform:uppercase;font-size:13px;cursor:pointer;min-height:44px;}
.tab.active{background:var(--ink);color:var(--paper);}

.card{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:18px;margin-bottom:14px;}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 14px;border-bottom:1px solid var(--line);padding-bottom:8px;}
.card h2.datehdr{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;color:var(--ink);font-weight:800;}
.daycount{font-size:10px;color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0;}

.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.row.single{grid-template-columns:1fr;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;padding:12px 10px;border:1px solid var(--line);border-radius:3px;font-size:16px;background:var(--paper);color:var(--ink);font-family:inherit;min-height:44px;-webkit-appearance:none;appearance:none;}
.field textarea{resize:vertical;min-height:60px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--moss);outline-offset:1px;}

.typepick{display:flex;gap:10px;margin-bottom:14px;}

  async function hashPIN(userId, pin){
    const data = new TextEncoder().encode(userId.toLowerCase() + ':' + pin);
    const buf = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  async function fbGetDoc(path){
    const db = window.__wlDB;
    const f = window.__wlFire;
    const ref = f.doc(db, ...path.split('/'));
    const snap = await f.getDoc(ref);
    return snap.exists() ? snap.data() : null;
  }

  async function fbSetDoc(path, data){
    const db = window.__wlDB;
    const f = window.__wlFire;
    const ref = f.doc(db, ...path.split('/'));
    await f.setDoc(ref, data, { merge: true });
  }

  const ADMIN_USER_ID  = 'admin'; // primary/bootstrap admin account (has PIN fallback below)
  const ADMIN_USER_IDS = ['admin', 'taksuk']; // all accounts with admin (global publish) rights
  const ADMIN_PIN_HASH = '97cdecb2ac28e75196d8a4e5d352889f3b54d88a9ae168fcdf3845ed5fcb754a';

  function isAdmin(){
    return !!currentUser && !currentUser.isGuest && ADMIN_USER_IDS.includes(String(currentUser.userId||'').toLowerCase());
  }

  // Per-user access control for Trip Rates / Fuel Pins, managed by admins in the Data tab.
  // Defaults to allowed (true) whenever a flag hasn't been explicitly set, so existing
  // accounts are never unexpectedly locked out until an admin deliberately restricts them.
  function hasAccess(feature){ // feature: 'rates' | 'fuelPins'
    if(!currentUser) return false;
    if(currentUser.isGuest) return true; // guests aren't part of the managed user list
    if(isAdmin()) return true; // admins always retain full access to their own tools
    if(!currentUser.access) return true;
    return currentUser.access[feature] !== false;
  }

  async function fbListUsers(){
    const db = window.__wlDB;
    const f = window.__wlFire;
    const snap = await f.getDocs(f.collection(db, 'users'));
    const list = [];
    snap.forEach(d=>{
      const data = d.data() || {};
      list.push({
        userId: data.userId || d.id,
        displayName: data.displayName || data.userId || d.id,
        access: data.access || { rates: true, fuelPins: true }
      });
    });
    list.sort((a,b)=> a.userId.localeCompare(b.userId));
    return list;
  }

  async function fbLoadGlobalDefaults(){
    try {
      const data = await fbGetDoc('globals/defaults');
      if(data){
        if(data.rates) return { rates: JSON.parse(data.rates), fuelPins: JSON.parse(data.fuelPins||'[]') };
      }
    } catch(e){ console.error('Failed to load global defaults', e); }
    return null;
  }

  // Publishes the ADMIN's current rates/fuel pins as the global defaults every
  // user's app merges in on load. Only ever called when the signed-in user is admin.
  async function fbSaveGlobalDefaults(){
    try {
      await fbSetDoc('globals/defaults', {
        rates: JSON.stringify(rates),
        fuelPins: JSON.stringify(fuelPins),
        updatedAt: Date.now(),
        updatedBy: currentUser ? currentUser.userId : ADMIN_USER_ID
      });

      console.error('Failed to publish global defaults', e);
      toast('Saved locally, but publishing to all users failed');

  async function fbSyncToCloud(){
    if(!currentUser || currentUser.isGuest) return;
    try {
      const uid = currentUser.userId;
      await fbSetDoc(`users/${uid}/data/worklog`, {
        entries: JSON.stringify(entries),
        rates: JSON.stringify(rates),
        fuelPins: JSON.stringify(fuelPins),
        deletedEntries: JSON.stringify(deletedEntries),
        updatedAt: Date.now()
      });
      localStorage.setItem('worklog:last_fb_sync', new Date().toISOString());
    } catch(e){ console.error('Firebase sync failed', e); }
  }

  async function fbLoadFromCloud(){
    if(!currentUser) return false;
    try {
      const uid = currentUser.userId;
      const data = await fbGetDoc(`users/${uid}/data/worklog`);
      if(data){
        if(data.entries) entries = JSON.parse(data.entries);
        if(data.rates) rates = JSON.parse(data.rates);
        if(data.fuelPins) fuelPins = JSON.parse(data.fuelPins);
        if(data.deletedEntries) deletedEntries = JSON.parse(data.deletedEntries);
        return true;
      }
    } catch(e){ console.error('Firebase load failed', e); }
    return false;
  }

  function saveSession(userId, displayName){
    localStorage.setItem('worklog:session', JSON.stringify({ userId, displayName, ts: Date.now() }));
  }

  function loadSession(){
    try {
      const s = localStorage.getItem('worklog:session');
      if(s) return JSON.parse(s);
    } catch(e){}
    return null;
  }

  function clearSession(){
    localStorage.removeItem('worklog:session');

  async function doRegister(userId, displayName, pin){
    if(!userId || !displayName || !pin) return 'All fields are required';
    if(!/^\d{4}$/.test(pin)) return 'PIN must be exactly 4 digits';
    if(!/^[a-zA-Z0-9_-]{3,20}$/.test(userId)) return 'User ID must be 3-20 characters (letters, numbers, _ -)';
    try {
      if(firebaseReady){
        // Online: check if userId already taken in Firestore
        const existing = await fbGetDoc(`users/${userId}`);
        if(existing) return 'That User ID is already taken — choose another';
        const pinHash = await hashPIN(userId, pin);
        await fbSetDoc(`users/${userId}`, {
          userId, displayName, pinHash, createdAt: Date.now(), access: { rates:false, fuelPins:false }
        });
        currentUser = { userId, displayName, access: { rates:false, fuelPins:false } };
        saveSession(userId, displayName);
        await fbSyncToCloud();
      } else {
        // Offline: register locally, sync when connected
        const pinHash = await hashPIN(userId, pin);
        localStorage.setItem('worklog:pending_reg', JSON.stringify({ userId, displayName, pinHash, createdAt: Date.now(), access: { rates:false, fuelPins:false } }));
        currentUser = { userId, displayName, access: { rates:false, fuelPins:false } };
        saveSession(userId, displayName);
      }
      return null; // success
    } catch(e){ return 'Registration failed: ' + e.message; }
  }

  async function doLogin(userId, pin){
    if(!userId || !pin) return 'Enter your User ID and PIN';
    try {
      if(firebaseReady){
        let user = await fbGetDoc(`users/${userId}`);
        // Admin fallback: use hardcoded credentials if not yet in Firestore
        if(!user && userId === ADMIN_USER_ID){
          user = { userId: ADMIN_USER_ID, displayName: 'Admin', pinHash: ADMIN_PIN_HASH };
        }
        if(!user) return 'User ID not found';
        const pinHash = await hashPIN(userId, pin);
        if(pinHash !== user.pinHash) return 'Incorrect PIN';
        currentUser = { userId, displayName: user.displayName, access: user.access || { rates:true, fuelPins:true } };
        saveSession(userId, user.displayName);
        const hasCloud = await fbLoadFromCloud();
        if(hasCloud){
          const localEntries = (() => { try{ return JSON.parse(localStorage.getItem('worklog:entries')||'[]'); }catch(e){ return []; } })();
          let entriesChanged = false;
          localEntries.forEach(le => {
            if(!entries.some(e=>e.id===le.id)){ entries.push(le); entriesChanged = true; }
          });
          try{ localStorage.setItem('worklog:entries', JSON.stringify(entries)); }catch(e){}
          try{ if(rates.length) localStorage.setItem('worklog:rates', JSON.stringify(rates)); }catch(e){}
          try{ if(fuelPins.length) localStorage.setItem('worklog:fuelpins', JSON.stringify(fuelPins)); }catch(e){}
          try{ localStorage.setItem('worklog:deleted', JSON.stringify(deletedEntries)); }catch(e){}
          if(entriesChanged){ autoBackup(); fbSyncToCloud(); }
        }
      } else {
        // Offline: check against locally cached PIN if available
        const cachedSession = loadSession();
        if(cachedSession && cachedSession.userId === userId){
          // Already had a session for this user — allow in
          currentUser = { userId, displayName: cachedSession.displayName };
          saveSession(userId, cachedSession.displayName);
        } else {
          return 'Cannot login while offline — no cached session for this User ID';
        }
      }
      return null;
    } catch(e){ return 'Login failed: ' + e.message; }
  }

  // ---- MST/MDT-aware date helper ----
  // Uses America/Edmonton (Alberta) which correctly handles MST (winter) / MDT (summer) daylight savings
  // Build timestamp — update this string whenever the file is regenerated
  const BUILD_TIME_MST = '2026-07-10 06:00';

  function todayMST(){
    return new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/Edmonton',
      year: 'numeric', month: '2-digit', day: '2-digit'
    }).format(new Date()); // en-CA formats as YYYY-MM-DD
  }

  function nowMSTTime(){
    return new Intl.DateTimeFormat('en-GB', {
      timeZone: 'America/Edmonton',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }).format(new Date()); // en-GB formats as HH:MM:SS (24hr)
  }

  function headerSyncLabel(){

      timeZone: 'America/Edmonton', month: 'short', day: '2-digit'
    }).format(d); // e.g. "Jul 08"
    const timePart = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'America/Edmonton', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }).format(d); // e.g. "14:32:07"
    return `Sync: ${datePart}, ${timePart} MST`;
  }

  function undoToast(msg, onUndo){

            // hardcoded-fallback admin bootstrap account before its first real save.
            // Without a pinHash the doc we're about to create would have none at all,
            // which would lock this account out of every future login. Fall back to
            // the known current PIN hash so login keeps working.
            const uidLower = String(currentUser.userId||'').toLowerCase();

          if(!existing && !updates.pinHash){
            errEl.textContent = 'Please set a PIN before saving (first-time setup for this account)';

            return;
          }
          await fbSetDoc(`users/${currentUser.userId}`, { userId: currentUser.userId, ...updates });

        // Update local session
        currentUser.displayName = newName;
        saveSession(currentUser.userId, newName);
        toast('Profile updated');
        closeModal();
        render();
      } catch(e){
        errEl.textContent = 'Save failed: '+e.message;
        saveBtn.textContent = 'Save Changes'; saveBtn.disabled = false;
      }
    };
  }

    overlay.querySelector('#confirm_ok').onclick = ()=>{ close(); onConfirm(); };
    overlay.onclick = e=>{ if(e.target === overlay) close(); };
  }

  const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;

  function daysLeftLabel(finalPaidAt){
    const elapsed = Date.now() - finalPaidAt;
    const msLeft = SEVEN_DAYS_MS - elapsed;
    if(msLeft <= 0) return 'soon';
    const daysLeft = Math.ceil(msLeft / (24*60*60*1000));
    return daysLeft <= 1 ? 'in 1 day' : `in ${daysLeft} days`;
  }

  // For a DH entry, true only when the DH claim itself (if any) AND every demurrage are Final Paid = Yes
  function dhAllFinalPaid(e){
    const hasClaim = !!(e.dh.claimed || calcClaimedValue(e.dh.start, e.dh.end));
    if(hasClaim && (e.dh.finalPaid||'No') !== 'Yes') return false;
    return (e.dh.demurrages||[]).every(d=>(d.finalPaid||'No') === 'Yes');
  }

  // For a TMW entry, true only when the top-level entry AND every waiting are Final Paid = Yes
  function tmwAllFinalPaid(e){
    if((e.finalPaid||'No') !== 'Yes') return false;
    return (e.tmw.waitings||[]).every(w=>(w.finalPaid||'No') === 'Yes');
  }

  function purgeExpiredEntries(){
    const before = entries.length;
    const stillActive = [];
    let movedToTrash = false;
    entries.forEach(e=>{
      let expired = false;
      if(e.type === 'DH'){
        expired = dhAllFinalPaid(e) && e.finalPaidAt && (Date.now() - e.finalPaidAt) >= SEVEN_DAYS_MS;
      } else {
        expired = tmwAllFinalPaid(e) && e.finalPaidAt && (Date.now() - e.finalPaidAt) >= SEVEN_DAYS_MS;
      }
      if(expired){
        deletedEntries.unshift({...e, deletedAt: Date.now(), deleteReason: 'auto'});
        movedToTrash = true;
      } else {
        stillActive.push(e);
      }
    });
    entries = stillActive;
    if(entries.length !== before) saveEntries();
    if(movedToTrash) saveDeletedEntries();
  }

  async function loadEntries(){
    try{
      const raw = localStorage.getItem('worklog:entries');
      entries = raw ? JSON.parse(raw) : [];
      entries.forEach(e=>{
        // Entry-level pay (top-level Real Pay / Final Paid dropdowns)
        if(e.realPay === undefined) e.realPay = 'No';
        if(e.finalPaid === undefined) e.finalPaid = 'No';

        // TMW waiting pay fields (must run before finalPaidAt calc below)
        if(e.type === 'TMW' && e.tmw && e.tmw.waitings){
          e.tmw.waitings.forEach(w=>{
            if(w.realPay === undefined) w.realPay = 'No';
            if(w.finalPaid === undefined) w.finalPaid = 'No';
          });
        }

        // DH-specific migrations
        if(e.type === 'DH' && e.dh){
          // DH claim row own pay status - carry over from entry-level if not set
          if(e.dh.realPay === undefined) e.dh.realPay = e.realPay || 'No';
          if(e.dh.finalPaid === undefined) e.dh.finalPaid = e.finalPaid || 'No';
          // Demurrages array
          if(!e.dh.demurrages) e.dh.demurrages = [];
          // Backfill pay fields on existing demurrages
          e.dh.demurrages.forEach(d=>{
            if(d.realPay === undefined) d.realPay = 'No';
            if(d.finalPaid === undefined) d.finalPaid = 'No';
          });
          // finalPaidAt only counts down once the DH claim AND every demurrage are Final Paid
          if(e.finalPaidAt === undefined){
            e.finalPaidAt = dhAllFinalPaid(e) ? Date.now() : null;
          }
        } else if(e.type === 'TMW'){
          // finalPaidAt only counts down once the entry AND every waiting are Final Paid
          if(e.finalPaidAt === undefined){
            e.finalPaidAt = tmwAllFinalPaid(e) ? Date.now() : null;
          }
        } else {
          if(e.finalPaidAt === undefined) e.finalPaidAt = e.finalPaid === 'Yes' ? Date.now() : null;
        }
      });
      purgeExpiredEntries();
    }catch(e){ entries = []; }
    // Admin-published global defaults (Firestore: globals/defaults) take priority over
    // the baked-in constants when available/online; each user's local edits still layer on top.
    let baseRates = BAKED_RATES;
    let baseFuelPins = BAKED_FUEL_PINS;
    if(firebaseReady){
      const globalDefaults = await fbLoadGlobalDefaults();
      if(globalDefaults){
        if(globalDefaults.rates) baseRates = globalDefaults.rates;
        if(globalDefaults.fuelPins) baseFuelPins = globalDefaults.fuelPins;
      }
    }
    // The admin's own published global doc is already their full, authoritative list
    // (it's exactly what fbSaveGlobalDefaults last sent). Re-overlaying local storage on
    // top of it would resurrect anything admin deleted, so admin uses it as-is.
    if(isAdmin() && firebaseReady){
      rates = baseRates.map(r=>({...r}));
      fuelPins = baseFuelPins.map(p=>({...p}));
    } else {
      try{
        const rraw = localStorage.getItem('worklog:rates');
        const storedRates = rraw ? JSON.parse(rraw) : [];
        // Merge: global/baked-in rates are the base; localStorage wins on same site name
        const mergedRates = baseRates.map(r=>({...r}));
        storedRates.forEach(sr => {
          const idx = mergedRates.findIndex(mr => mr.site.trim().toLowerCase() === sr.site.trim().toLowerCase());
          if(idx > -1) mergedRates[idx] = sr;
          else mergedRates.push(sr);
        });
        rates = mergedRates;
      }catch(e){ rates = baseRates.map(r=>({...r})); }
      try{
        const fraw = localStorage.getItem('worklog:fuelpins');
        const stored = fraw ? JSON.parse(fraw) : [];
        // Merge: global/baked-in pins are the base; localStorage wins on same truck number
        const merged = baseFuelPins.map(p=>({...p}));
        stored.forEach(sp => {
          const idx = merged.findIndex(mp => mp.truck.trim().toLowerCase() === sp.truck.trim().toLowerCase());
          if(idx > -1) merged[idx] = sp;
          else merged.push(sp);
        });
        fuelPins = merged;
      }catch(e){ fuelPins = baseFuelPins.map(p=>({...p})); }
    }
    try{
      const draw = localStorage.getItem('worklog:deleted');
      deletedEntries = draw ? JSON.parse(draw) : [];
      purgeOldDeleted();
    }catch(e){ deletedEntries = []; }
    try{
      lastExportTs = localStorage.getItem('worklog:lastExport') ? +localStorage.getItem('worklog:lastExport') : null;
      lastImportTs = localStorage.getItem('worklog:lastImport') ? +localStorage.getItem('worklog:lastImport') : null;
    }catch(e){}
    if(!editingId && !form.truck) form.truck = lastTruckForDate(form.date);
    loaded = true;
    renderApp();
    // Clear any previously-created timers before starting new ones — loadEntries()
    // can run more than once per page session (login, register, guest login, or
    // signing out and back in again), and without this, each run would stack a new
    // set of intervals on top of the last, multiplying purges/syncs/renders over time.
    clearInterval(_purgeInterval);
    clearInterval(_connInterval);
    clearInterval(_clockInterval);
    _purgeInterval = setInterval(()=>{ purgeExpiredEntries(); purgeOldDeleted(); if(view==='log'||view==='deleted'||view==='paycheck') render(); }, 60*60*1000);
    _connInterval = setInterval(()=>{
      // Update connectivity dot without full re-render
      const dot = document.getElementById('conn_indicator');
      if(dot && currentUser){
        const online = firebaseReady && !currentUser.isGuest;
        const guest = currentUser.isGuest;
        dot.style.background = online ? '#3cba54' : guest ? '#f4a400' : '#e53935';
        dot.style.boxShadow = online ? '0 0 0 2px rgba(60,186,84,.25)' : guest ? '0 0 0 2px rgba(244,164,0,.25)' : '0 0 0 2px rgba(229,57,53,.25)';
        dot.className = online ? 'conn-online' : '';
        dot.title = online ? 'Connected to server' : guest ? 'Guest — local only' : 'Offline';
      }
      const syncLabel = document.getElementById('hdr_sync_label');
      if(syncLabel) syncLabel.textContent = headerSyncLabel();
    }, 3000);
    _clockInterval = setInterval(()=>{
      const clockEl = document.getElementById('live_clock');
      if(clockEl) clockEl.textContent = nowMSTTime();
    }, 1000);
  }

  function calcClaimedDecimal(start, end){
    if(!start || !end) return '';
    const sp = start.split(':').map(Number), ep = end.split(':').map(Number);
    if(sp.length < 2 || ep.length < 2 || isNaN(sp[0]) || isNaN(ep[0])) return '';
    const [sh,sm] = sp, [eh,em] = ep;
    let mins = (eh*60+em) - (sh*60+sm);
    const nextDay = mins < 0;
    if(nextDay) mins += 24*60;
    mins = Math.round(mins/15)*15;
    const dec = mins/60;
    const val = Number.isInteger(dec) ? String(dec) : dec.toFixed(2);
    return val;
  }
  function calcClaimedValue(start, end){
    // Returns just the numeric portion for saving
    const full = calcClaimedDecimal(start, end);
    return full || '';
  }

  function calcClaimedTMW(start, end){
    // TMW waiting = (end - start) - 1 hour, rounded to nearest 15min
    if(!start || !end) return '';
    const sp = start.split(':').map(Number), ep = end.split(':').map(Number);
    if(sp.length < 2 || ep.length < 2 || isNaN(sp[0]) || isNaN(ep[0])) return '';
    const [sh,sm] = sp, [eh,em] = ep;
    let mins = (eh*60+em) - (sh*60+sm);
    if(mins < 0) mins += 24*60;
    mins -= 60; // subtract 1 hour
    if(mins <= 0) return '';
    mins = Math.round(mins/15)*15;
    const dec = mins/60;
    return Number.isInteger(dec) ? String(dec) : dec.toFixed(2);
  }

  function claimedDisplay(val){
    if(!val) return '';
    const m = String(val).match(/^(\d+)h\s*(\d+)m$/i);
    if(m){
      const decimal = (+m[1]) + (+m[2])/60;
      return Number.isInteger(decimal) ? String(decimal) : decimal.toFixed(2);
    }
    return String(val).replace(/\s*\(next day \+\)/g, '');
  }

  function claimedTimeOptions(selected){
    let opts = `<option value="" ${selected===''?'selected':''}>Select claimed time&hellip;</option>`;
    for(let mins=0; mins<=24*60; mins+=15){
      const decimal = mins/60;
      const label = Number.isInteger(decimal) ? String(decimal) : decimal.toFixed(2);
      opts += `<option value="${label}" ${selected===label?'selected':''}>${label}</option>`;
    }
    return opts;
  }

  function minutesBetween(start, end){
    if(!start || !end) return null;
    const [sh,sm] = start.split(':').map(Number);
    const [eh,em] = end.split(':').map(Number);
    let mins = (eh*60+em) - (sh*60+sm);
    if(mins < 0) mins += 24*60;
    return mins;
  }
  function fmtDuration(mins){
    if(mins===null) return '';
    const h = Math.floor(mins/60), m = mins%60;
    return `${h}h ${m}m`;
  }

  function renderLog(){
    if(entries.length === 0){
      return `<div class="card"><div class="empty">No entries yet. Switch to "New Entry" to log your first day.</div></div>`;
    }

    // filter entries by exact date
    let filtered = entries;
    if(logDateFilter) filtered = filtered.filter(e=> e.date === logDateFilter);

      <input id="log_date_filter" type="date" value="${logDateFilter}" style="flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:3px;font-size:14px;background:var(--paper);color:var(--ink);font-family:inherit;min-height:38px;">
      <button id="log_date_today" style="padding:8px 12px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;white-space:nowrap;min-height:38px;">Today</button>
      <button id="log_date_clear" style="padding:8px 12px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;white-space:nowrap;min-height:38px;">Clear</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button id="log_view_detail" style="flex:1;padding:9px;border:2px solid var(--ink);border-radius:4px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;background:${logViewMode==='detail'?'var(--ink)':'var(--panel)'};color:${logViewMode==='detail'?'var(--paper)':'var(--ink)'};">Detail View</button>
      <button id="log_view_list" style="flex:1;padding:9px;border:2px solid var(--ink);border-radius:4px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;background:${logViewMode==='list'?'var(--ink)':'var(--panel)'};color:${logViewMode==='list'?'var(--paper)':'var(--ink)'};">List View</button>

      return html;

            (e.dh.demurrages||[]).forEach(d=> allClaims.push({ realPay: d.realPay||'No', finalPaid: d.finalPaid||'No' }));
            if(!allClaims.length) return e.finalPaid==='Yes' ? 'paid-final' : (e.realPay==='Yes' ? 'paid-real' : '');
            const allFinal = allClaims.every(c=> c.finalPaid==='Yes');

          </tr>`;
        });
      });
    });

    html += `</table></div>`;
    return html;
  }

  function renderPayCheck(){
    if(entries.length === 0){
      return `<div class="card"><div class="empty">No entries yet. Switch to "New Entry" to log your first day.</div></div>`;
    }

    function dhRealPending(e){
      const hasClaim = !!(e.dh.claimed || calcClaimedValue(e.dh.start, e.dh.end));
      if(hasClaim && (e.dh.realPay||'No') !== 'Yes') return true;
      return (e.dh.demurrages||[]).some(d=>(d.realPay||'No') !== 'Yes');
    }
    function dhFinalPending(e){
      const hasClaim = !!(e.dh.claimed || calcClaimedValue(e.dh.start, e.dh.end));
      if(hasClaim && (e.dh.finalPaid||'No') !== 'Yes') return true;
      return (e.dh.demurrages||[]).some(d=>(d.finalPaid||'No') !== 'Yes');
    }

    let realPending = 0, finalPending = 0;
    entries.forEach(e=>{
      if(e.type === 'DH'){
        if(dhRealPending(e)) realPending++;
        if(dhFinalPending(e)) finalPending++;
      } else {
        const topReal  = (e.realPay||'No') !== 'Yes';
        const topFinal = (e.finalPaid||'No') !== 'Yes';
        const waitReal  = e.tmw.waitings.some(w=>(w.realPay||'No') !== 'Yes');
        const waitFinal = e.tmw.waitings.some(w=>(w.finalPaid||'No') !== 'Yes');
        if(topReal || waitReal) realPending++;
        if(topFinal || waitFinal) finalPending++;
      }
    });

    let filtered = entries;
    if(payFilter === 'real_pending'){
      filtered = entries.filter(e=>{
        if(e.type === 'DH') return dhRealPending(e);
        return (e.realPay||'No') !== 'Yes' || e.tmw.waitings.some(w=>(w.realPay||'No') !== 'Yes');
      });
    } else if(payFilter === 'final_pending'){
      filtered = entries.filter(e=>{
        if(e.type === 'DH') return dhFinalPending(e);
        return (e.finalPaid||'No') !== 'Yes' || e.tmw.waitings.some(w=>(w.finalPaid||'No') !== 'Yes');
      });
    }

    if(payCutoffDate) filtered = filtered.filter(e=> e.date <= payCutoffDate);

    let html = `<div class="statusbar">
      <div class="statcard ${payFilter==='real_pending'?'active-filter':''}" id="pfilter_real">
        <div class="stat-num ${realPending>0?'stat-warn':''}">${realPending}</div>
        <div class="stat-lab">Real Pay Pending</div>
      </div>
      <div class="statcard ${payFilter==='final_pending'?'active-filter':''}" id="pfilter_final">
        <div class="stat-num ${finalPending>0?'stat-warn':''}">${finalPending}</div>
        <div class="stat-lab">Final Pay Pending</div>
      </div>
      <div class="statcard ${payFilter==='all'?'active-filter':''}" id="pfilter_all">
        <div class="stat-num">${entries.length}</div>
        <div class="stat-lab">All Entries</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:10px 14px;">
      <label style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap;">Show up to</label>
      <input id="pcutoff_date" type="date" value="${payCutoffDate}" style="flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:3px;font-size:14px;background:var(--paper);color:var(--ink);font-family:inherit;min-height:38px;">
      <button id="pcutoff_today" style="padding:8px 12px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;white-space:nowrap;min-height:38px;">Today</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button id="pay_view_detail" style="flex:1;padding:9px;border:2px solid var(--ink);border-radius:4px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;background:${payViewMode==='detail'?'var(--ink)':'var(--panel)'};color:${payViewMode==='detail'?'var(--paper)':'var(--ink)'};">Detail View</button>
      <button id="pay_view_list" style="flex:1;padding:9px;border:2px solid var(--ink);border-radius:4px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;background:${payViewMode==='list'?'var(--ink)':'var(--panel)'};color:${payViewMode==='list'?'var(--paper)':'var(--ink)'};">List View</button>
    </div>`;

    if(filtered.length === 0){
      html += `<div class="card"><div class="empty">No entries match this filter.</div></div>`;
      return html;
    }

    if(payViewMode === 'list'){
      html += renderPayCheckList(filtered);
      return html;
    }

    const groups = {};
    filtered.forEach(e=>{
      if(!groups[e.date]) groups[e.date] = [];
      groups[e.date].push(e);
    });
    const dates = Object.keys(groups).sort((a,b)=> b.localeCompare(a));

    dates.forEach(date=>{
      const dayEntries = groups[date].sort((a,b)=> b.created - a.created);
      const dObj = new Date(date + 'T00:00:00');
      const niceDate = dObj.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });

      html += `<div class="card">
        <h2 class="datehdr">
          <span>${esc(niceDate)} <span class="daycount">${dayEntries.length} ${dayEntries.length===1?'entry':'entries'}</span></span>
        </h2>`;

      const tmwEntries = dayEntries.filter(e=>e.type==='TMW');
      const dhEntries = dayEntries.filter(e=>e.type==='DH');

      dhEntries.forEach(e=>{
        html += `<div class="logrow">
          <div class="logrow-head">
            <span class="badge dh">DH</span> <span class="lognum">${esc(e.dh.number)}</span>
            <span class="logtruck">Truck ${esc(e.truck)}</span>
          </div>`;
        const claimed = e.dh.claimed || calcClaimedValue(e.dh.start, e.dh.end);
        if(claimed){
          const dhClaimReal = e.dh.realPay || 'No';
          const dhClaimFinal = e.dh.finalPaid || 'No';
          const dhStatus = dhClaimFinal==='Yes'?'paid-final':(dhClaimReal==='Yes'?'paid-real':'');
          html += `<div class="claimrow ${dhStatus}">
            <div class="claimrow-top">
              <span class="claimtime">${esc(claimedDisplay(claimed))}</span>
              <span class="claimkind">${esc(e.dh.reason)||'Deadhead'}</span>
              <span class="claimref">Ref: ${esc(e.dh.ref)||'&mdash;'}</span>
            </div>
            <div class="refpay">
              <div class="paystat-field">
                <label>Real Pay</label>
                <select data-dh-pay="${e.id}" data-dh-key="realPay">
                  <option value="No" ${dhClaimReal==='No'?'selected':''}>No</option>
                  <option value="Yes" ${dhClaimReal==='Yes'?'selected':''}>Yes</option>
                </select>
              </div>
              <div class="paystat-field">
                <label>Final Paid</label>
                <select data-dh-pay="${e.id}" data-dh-key="finalPaid">
                  <option value="No" ${dhClaimFinal==='No'?'selected':''}>No</option>
                  <option value="Yes" ${dhClaimFinal==='Yes'?'selected':''}>Yes</option>
                </select>
              </div>
              ${dhAllFinalPaid(e) && e.finalPaidAt ? `<span class="autodel">Auto-deletes ${esc(daysLeftLabel(e.finalPaidAt))}</span>` : ''}
            </div>
            <button class="delbtn comment-btn ${e.dh.comment&&e.dh.comment.trim()?'has-comment':''}" data-comment-id="${e.id}" data-comment-scope="dh">${e.dh.comment&&e.dh.comment.trim() ? '💬 '+esc(e.dh.comment.length>40?e.dh.comment.slice(0,40)+'&hellip;':e.dh.comment) : '+ Add Comment'}</button>
          </div>`;
        }
        if(e.dh.demurrages && e.dh.demurrages.length){
          e.dh.demurrages.forEach((d,di)=>{
            const dStatus = (d.finalPaid||'No')==='Yes'?'paid-final':((d.realPay||'No')==='Yes'?'paid-real':'');
            html += `<div class="claimrow ${dStatus}">
              <div class="claimrow-top">
                <span class="claimtime">${esc(claimedDisplay(d.claimed))||'&mdash;'}</span>
                <span class="claimkind">${esc(d.reason)||'Demurrage'}</span>
                <span class="claimref">Ref: ${esc(d.ref)||'&mdash;'}</span>
              </div>
              <div class="refpay">
                <div class="paystat-field">
                  <label>Real Pay</label>
                  <select data-demurrage="${e.id}" data-didx="${di}" data-dkey="realPay">
                    <option value="No" ${(d.realPay||'No')==='No'?'selected':''}>No</option>
                    <option value="Yes" ${(d.realPay||'No')==='Yes'?'selected':''}>Yes</option>
                  </select>
                </div>
                <div class="paystat-field">
                  <label>Final Paid</label>
                  <select data-demurrage="${e.id}" data-didx="${di}" data-dkey="finalPaid">
                    <option value="No" ${(d.finalPaid||'No')==='No'?'selected':''}>No</option>
                    <option value="Yes" ${(d.finalPaid||'No')==='Yes'?'selected':''}>Yes</option>
                  </select>
                </div>
              </div>
              <button class="delbtn comment-btn ${d.comment&&d.comment.trim()?'has-comment':''}" data-comment-id="${e.id}" data-comment-scope="demurrage" data-comment-idx="${di}">${d.comment&&d.comment.trim() ? '💬 '+esc(d.comment.length>40?d.comment.slice(0,40)+'&hellip;':d.comment) : '+ Add Comment'}</button>
            </div>`;
          });
        }
        html += `</div>`;
      });

      tmwEntries.forEach(e=>{
        const badge = `<span class="badge tmw">TMW</span>`;
        const siteRate = findRate(e.tmw.site);
        const siteLabel = `<span class="logsite">${esc((e.tmw.site||'').toUpperCase())}${siteRate ? ` &middot; $${esc(siteRate)}` : ''}</span>`;
        const allWaitFinal = e.tmw.waitings.every(w=>(w.finalPaid||'No')==='Yes');
        const allWaitReal  = e.tmw.waitings.every(w=>(w.realPay||'No')==='Yes');
        const tmwAllFinal = e.finalPaid==='Yes' && allWaitFinal;
        const tmwAllReal  = e.realPay==='Yes' && allWaitReal;
        const tmwStatusClass = tmwAllFinal ? 'paid-final' : (tmwAllReal ? 'paid-real' : '');
        html += `<div class="logrow ${tmwStatusClass}">
          <div class="logrow-head">
            ${badge} <span class="lognum">${esc(e.tmw.number)}</span>
            ${siteLabel}
            <span class="logtruck">Truck ${esc(e.truck)}</span>
          </div>
          <div class="paystatus">
            <div class="paystat-field">
              <label>Real Pay</label>
              <select data-pay="${e.id}" data-paykey="realPay">
                <option value="No" ${e.realPay==='No'?'selected':''}>No</option>
                <option value="Yes" ${e.realPay==='Yes'?'selected':''}>Yes</option>
              </select>
            </div>
            <div class="paystat-field">
              <label>Final Paid</label>
              <select data-pay="${e.id}" data-paykey="finalPaid">
                <option value="No" ${e.finalPaid==='No'?'selected':''}>No</option>
                <option value="Yes" ${e.finalPaid==='Yes'?'selected':''}>Yes</option>
              </select>
            </div>
            ${tmwAllFinal && e.finalPaidAt ? `<span class="autodel">Auto-deletes ${esc(daysLeftLabel(e.finalPaidAt))}</span>` : ''}
          </div>
          <button class="delbtn comment-btn ${e.comment&&e.comment.trim()?'has-comment':''}" data-comment-id="${e.id}" data-comment-scope="entry">${e.comment&&e.comment.trim() ? '💬 '+esc(e.comment.length>40?e.comment.slice(0,40)+'&hellip;':e.comment) : '+ Add Comment'}</button>`;

        if(e.tmw.waitings.length){
          e.tmw.waitings.forEach((w,wi)=>{
            if(w.realPay === undefined) w.realPay = 'No';
            if(w.finalPaid === undefined) w.finalPaid = 'No';
            const wStatus = w.finalPaid==='Yes' ? 'paid-final' : (w.realPay==='Yes' ? 'paid-real' : '');
            html += `<div class="claimrow ${wStatus}">
              <div class="claimrow-top">
                <span class="claimtime">${esc(claimedDisplay(w.claimed))||'&mdash;'}</span>
                <span class="claimkind">${esc(w.kind)||'&mdash;'}</span>
                <span class="claimref">Ref: ${esc(w.ref)||'&mdash;'}</span>
              </div>
              <div class="refpay">
                <div class="paystat-field">
                  <label>Real Pay</label>
                  <select data-refpay="${e.id}" data-refscope="tmw" data-refidx="${wi}" data-refkey="realPay">
                    <option value="No" ${w.realPay==='No'?'selected':''}>No</option>
                    <option value="Yes" ${w.realPay==='Yes'?'selected':''}>Yes</option>
                  </select>
                </div>
                <div class="paystat-field">
                  <label>Final Paid</label>
                  <select data-refpay="${e.id}" data-refscope="tmw" data-refidx="${wi}" data-refkey="finalPaid">
                    <option value="No" ${w.finalPaid==='No'?'selected':''}>No</option>
                    <option value="Yes" ${w.finalPaid==='Yes'?'selected':''}>Yes</option>
                  </select>
                </div>
              </div>
              <button class="delbtn comment-btn ${w.comment&&w.comment.trim()?'has-comment':''}" data-comment-id="${e.id}" data-comment-scope="waiting" data-comment-idx="${wi}">${w.comment&&w.comment.trim() ? '💬 '+esc(w.comment.length>40?w.comment.slice(0,40)+'&hellip;':w.comment) : '+ Add Comment'}</button>
            </div>`;
          });
        }
        html += `</div>`;
      });

      html += `</div>`;
    });

    return html;
  }

  function renderSavingFocus(){
    const active = document.activeElement;
    if(active && active.id && app.contains(active)){
      _focusId = active.id;
      _focusCursor = (active.selectionStart !== undefined) ? active.selectionStart : null;
    }
    render();
  }

  function renderApp(){
    const app = document.getElementById('app');
    if(!currentUser){
      app.innerHTML = renderAuthScreen();
      bindAuthScreen();
      return;
    }
    render();
  }

  function render(){
    const app = document.getElementById('app');
    if(!loaded){
      app.innerHTML = `<div class="empty" style="padding:40px;text-align:center;">Loading&hellip;</div>`;
      return;
    }
    app.innerHTML = `
      <div class="hdr">
        <div class="hdr-top">
          <h1>Daily Work Log</h1>
          <div class="hdr-sync">
            <span id="conn_indicator" title="${firebaseReady && !currentUser?.isGuest ? 'Connected to server' : currentUser?.isGuest ? 'Guest — local only' : 'Offline'}" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${firebaseReady && !currentUser?.isGuest ? '#3cba54' : currentUser?.isGuest ? '#f4a400' : '#e53935'};box-shadow:0 0 0 2px ${firebaseReady && !currentUser?.isGuest ? 'rgba(60,186,84,.25)' : currentUser?.isGuest ? 'rgba(244,164,0,.25)' : 'rgba(229,57,53,.25)'};flex-shrink:0;" class="${firebaseReady && !currentUser?.isGuest ? 'conn-online' : ''}"></span>
            <span id="hdr_sync_label">${esc(headerSyncLabel())}</span>
          </div>
        </div>
        <div class="hdr-status">
          <span class="who">${currentUser.isGuest ? '👤 Guest' : '👤 '+esc(currentUser.displayName)}</span>
          ${currentUser.isGuest
            ? `<button id="btn_logout">Sign In</button>`
            : `<button id="btn_profile">Profile</button>`}
        </div>
      </div>
      <div class="tabs">
        <div class="tab ${view==='entry'?'active':''}" id="tab_entry">New Entry</div>
        <div class="tab ${view==='log'?'active':''}" id="tab_log">View Logs</div>
        <div class="tab ${view==='fuel'?'active':''}" id="tab_fuel">Fuel Pins</div>
        <div class="tab ${view==='paycheck'?'active':''}" id="tab_paycheck">Pay Check</div>
        <div class="tab ${view==='rates'?'active':''}" id="tab_rates">Trip Rates</div>
        <div class="tab ${view==='deleted'?'active':''}" id="tab_deleted">Trash${deletedEntries.length?` (${deletedEntries.length})`:''}</div>
        <div class="tab ${view==='data'?'active':''}" id="tab_data">Data</div>
      </div>

      ${view==='entry' ? renderEntryForm() : view==='rates' ? renderRates() : view==='fuel' ? renderFuelPins() : view==='deleted' ? renderDeleted() : view==='data' ? renderData() : view==='paycheck' ? renderPayCheck() : renderLog()}
    `;
    bindEvents();
    const appEl = document.getElementById('app');
    attach24hrInputs(appEl);
    document.getElementById('btn_logout')?.addEventListener('click', ()=>{
      if(currentUser?.isGuest){
        // Guest just goes to login screen
        clearSession();
        currentUser = null;
        authScreen = 'login';
        authError = '';
        renderApp();
        return;
      }
      if(!confirm('Sign out of this device?')) return;
      clearSession();
      currentUser = null;
      authScreen = 'login';
      authError = '';
      renderApp();
    });
    document.getElementById('btn_profile')?.addEventListener('click', ()=>{
      showProfileModal();
    });
    if(_focusId){
      const el = app.querySelector('#'+_focusId);
      if(el){
        el.focus();
        if(_focusCursor !== null && el.setSelectionRange){
          try{ el.setSelectionRange(_focusCursor, _focusCursor); }catch(e){}
        }
      }
      _focusId = null; _focusCursor = null;
    }
    if(commentModal) showCommentModal();
  }

  function bindEvents(){
    const app = document.getElementById('app');
    const $ = sel => app.querySelector(sel);
    const tabEntry = $('#tab_entry'), tabLog = $('#tab_log'), tabPaycheck = $('#tab_paycheck'), tabRates = $('#tab_rates'), tabFuel = $('#tab_fuel'), tabDeleted = $('#tab_deleted'), tabData = $('#tab_data');
    if(tabEntry) tabEntry.onclick = ()=>{ editingId = null; form = blankForm(); view='entry'; render(); };
    if(tabLog) tabLog.onclick = ()=>{ view='log'; render(); };
    if(tabPaycheck) tabPaycheck.onclick = ()=>{ view='paycheck'; render(); };
    if(tabRates) tabRates.onclick = ()=>{ view='rates'; render(); };
    if(tabFuel) tabFuel.onclick = ()=>{ editingFuelId=null; fuelForm={truck:'',pins:['']}; view='fuel'; render(); };
    if(tabDeleted) tabDeleted.onclick = ()=>{ view='deleted'; render(); };
    if(tabData) tabData.onclick = ()=>{ view='data'; render(); };

    if(view === 'entry'){
      const fDate = $('#f_date'), fTruck = $('#f_truck');
      if(fDate) fDate.oninput = e=>{
        form.date = e.target.value;
        if(!editingId) form.truck = lastTruckForDate(form.date);
        render();
      };
      if(fTruck) fTruck.oninput = e=> form.truck = e.target.value;

      const pickDh = $('#pick_dh'), pickTmw = $('#pick_tmw');
      if(pickDh) pickDh.onclick = ()=> setType('DH');
      if(pickTmw) pickTmw.onclick = ()=> setType('TMW');

      if(form.type === 'DH'){
        ['number','ref'].forEach(k=>{
          const el = $('#dh_'+k);
          if(el) el.oninput = e=>{
            form.dh[k] = e.target.value;
            if(k === 'number'){
              let flag = app.querySelector('.num-flag');
              const bad = e.target.value && !/^\d{7}$/.test(e.target.value.trim());
              if(bad && !flag){
                flag = document.createElement('div');
                flag.className = 'num-flag';
                flag.textContent = '⚠ Must be exactly 7 digits';
                el.closest('.row').after(flag);
              } else if(!bad && flag){
                flag.remove();
              }
            }
          };
        });
        const reasonEl = $('#dh_reason');
        if(reasonEl){
          reasonEl.oninput = e=>{
            form.dh.reason = e.target.value;
            e.target.style.height = '44px';
            e.target.style.height = e.target.scrollHeight + 'px';
          };
          reasonEl.style.height = '44px';
          if(reasonEl.scrollHeight > 44) reasonEl.style.height = reasonEl.scrollHeight + 'px';
        }
        ['start','end'].forEach(k=>{
          const el = $('#dh_'+k);
          if(el) el.oninput = e=>{
            form.dh[k] = e.target.value;
            // Only re-render to update claimed time preview when time is complete
            if(e.target.value.length === 5) renderSavingFocus();
            else {
              // Just update the claimed display without full re-render
              const disp = app.querySelector('.claimed-auto');
              if(disp) disp.textContent = calcClaimedDecimal(form.dh.start, form.dh.end) || 'Enter start & end time above';
            }
          };
        });
      }

      if(form.type === 'TMW'){
        const num = $('#tmw_number'), site = $('#tmw_site');
        if(num) num.oninput = e=>{
          form.tmw.number = e.target.value;
          let flag = app.querySelector('.num-flag');
          const bad = e.target.value && !/^\d{7}$/.test(e.target.value.trim());
          if(bad && !flag){
            flag = document.createElement('div');
            flag.className = 'num-flag';
            flag.textContent = '⚠ Must be exactly 7 digits';
            num.closest('.row').after(flag);
          } else if(!bad && flag){
            flag.remove();
          }
        };
        if(site){
          site.oninput = e=>{ form.tmw.site = e.target.value.toUpperCase(); e.target.value = form.tmw.site; };
          site.onblur = ()=> renderSavingFocus();
        }

        const wNo = $('#wait_no'), wYes = $('#wait_yes');
        if(wNo) wNo.onclick = ()=>{ form.tmw.anyWaiting = false; form.tmw.waitings = []; render(); };
        if(wYes) wYes.onclick = ()=>{
          form.tmw.anyWaiting = true;
          if(form.tmw.waitings.length === 0) form.tmw.waitings.push(blankWaiting());
          render();
        };

        app.querySelectorAll('[data-w]').forEach(el=>{
          const handler = e=>{
            const idx = +e.target.dataset.w, key = e.target.dataset.k;
            form.tmw.waitings[idx][key] = e.target.value;
            // When start or end time is complete, re-render to auto-calc claimed time
            if((key === 'start' || key === 'end') && e.target.value.length === 5){
              // Clear manual override so auto-calc takes over
              form.tmw.waitings[idx]._autoCalc = null;
              renderSavingFocus();
            }
          };
          el.oninput = handler;
          el.onchange = handler;
        });
        app.querySelectorAll('.removewait').forEach(btn=>{
          btn.onclick = e=>{
            const idx = +e.currentTarget.dataset.idx;
            form.tmw.waitings.splice(idx,1);
            render();
          };
        });
        const addWait = $('#add_waiting');
        if(addWait) addWait.onclick = ()=>{ form.tmw.waitings.push(blankWaiting()); render(); };
      }

      const saveBtn = $('#save_entry'), resetBtn = $('#reset_entry'), saveAnotherBtn = $('#save_and_another'), saveAllBtn = $('#save_all_loads');
      if(saveBtn) saveBtn.onclick = (!editingId && form.type) ? onSaveAndAnother : onSave;
      if(saveAnotherBtn) saveAnotherBtn.onclick = onSaveAndAnother;
      if(saveAllBtn) saveAllBtn.onclick = onSaveAllLoads;
      app.querySelectorAll('[data-remove-pending]').forEach(btn => {
        btn.onclick = e => {
          const idx = +e.currentTarget.dataset.removePending;
          pendingLoads.splice(idx, 1);
          render();
        };
      });
      if(resetBtn) resetBtn.onclick = ()=>{
        const wasEditing = !!editingId;
        editingId = null;
        pendingLoads = [];
        form = blankForm();
        if(wasEditing) view = 'log';
        render();
      };
    } else if(view === 'log') {
      app.querySelector('#log_date_filter')?.addEventListener('change', e=>{ logDateFilter=e.target.value; render(); });
      app.querySelector('#log_date_today')?.addEventListener('click', ()=>{ logDateFilter=todayMST(); render(); });
      app.querySelector('#log_date_clear')?.addEventListener('click', ()=>{ logDateFilter=''; render(); });
      app.querySelector('#log_view_detail')?.addEventListener('click', ()=>{ logViewMode='detail'; render(); });
      app.querySelector('#log_view_list')?.addEventListener('click', ()=>{ logViewMode='list'; render(); });

      app.querySelectorAll('[data-edit]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.edit;
          const entry = entries.find(en=>en.id === id);
          if(entry) loadIntoForm(entry);
        };
      });
      app.querySelectorAll('[data-del]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.del;
          confirmModal('Move this entry to Trash? It will be permanently deleted after 30 days.', ()=>{
            const idx = entries.findIndex(en=>en.id === id);
            if(idx === -1) return;
            const removed = {...entries[idx], deletedAt: Date.now(), deleteReason: 'user'};
            entries.splice(idx, 1);
            deletedEntries.unshift(removed);
            saveEntries();
            saveDeletedEntries();
            render();
            undoToast('Moved to Trash', ()=>{
              deletedEntries = deletedEntries.filter(e=>e.id !== removed.id);
              entries.splice(idx, 0, removed);
              saveEntries();
              saveDeletedEntries();
              render();
            });
          });
        };
      });

      // demurrage bindings (Add/Edit/Delete still live in View Logs; pay status moved to Pay Check)
      app.querySelectorAll('[data-add-demurrage]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.addDemurrage;
          demurrageForm = { entryId:id, editIdx:null, ref:'', start:'', end:'', claimed:'', reason:'' };
          showDemurrageModal();
        };
      });
      app.querySelectorAll('[data-edit-demurrage]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.editDemurrage, di = +e.currentTarget.dataset.editDemurrageIdx;
          const entry = entries.find(en=>en.id===id);
          if(!entry || !entry.dh.demurrages[di]) return;
          const d = entry.dh.demurrages[di];
          demurrageForm = { entryId:id, editIdx:di, ref:d.ref||'', start:d.start||'', end:d.end||'', claimed:d.claimed||'', reason:d.reason||'' };
          showDemurrageModal();
        };
      });
      app.querySelectorAll('[data-del-demurrage]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.delDemurrage, di = +e.currentTarget.dataset.delDemurrageIdx;
          confirmModal('Delete this demurrage?', ()=>{
            const entry = entries.find(en=>en.id===id);
            if(!entry) return;
            entry.dh.demurrages.splice(di,1);
            saveEntries();
            render();
          });
        };
      });
    } else if(view === 'paycheck'){
      app.querySelector('#pfilter_all')?.addEventListener('click', ()=>{ payFilter='all'; payCutoffDate=todayMST(); render(); });
      app.querySelector('#pfilter_real')?.addEventListener('click', ()=>{ payFilter = payFilter==='real_pending'?'all':'real_pending'; payCutoffDate=todayMST(); render(); });
      app.querySelector('#pfilter_final')?.addEventListener('click', ()=>{ payFilter = payFilter==='final_pending'?'all':'final_pending'; payCutoffDate=todayMST(); render(); });
      app.querySelector('#pcutoff_date')?.addEventListener('change', e=>{ payCutoffDate=e.target.value; render(); });
      app.querySelector('#pcutoff_today')?.addEventListener('click', ()=>{ payCutoffDate=todayMST(); render(); });
      app.querySelector('#pay_view_detail')?.addEventListener('click', ()=>{ payViewMode='detail'; render(); });
      app.querySelector('#pay_view_list')?.addEventListener('click', ()=>{ payViewMode='list'; render(); });

      app.querySelectorAll('[data-pay]').forEach(sel=>{
        sel.onchange = e=>{
          const id = e.target.dataset.pay, key = e.target.dataset.paykey;
          const entry = entries.find(en=>en.id === id);
          if(!entry) return;
          entry[key] = e.target.value;
          if(entry.type === 'DH' && entry.dh){ entry.dh[key] = e.target.value; }
          if(key === 'finalPaid'){
            if(entry.type === 'DH'){
              entry.finalPaidAt = dhAllFinalPaid(entry) ? Date.now() : null;
            } else {
              entry.finalPaidAt = tmwAllFinalPaid(entry) ? Date.now() : null;
            }
          }
          saveEntries();
          toast('Updated');
          render();
        };
      });
      app.querySelectorAll('[data-refpay]').forEach(sel=>{
        sel.onchange = e=>{
          const id = e.target.dataset.refpay, scope = e.target.dataset.refscope, key = e.target.dataset.refkey;
          const entry = entries.find(en=>en.id === id);
          if(!entry) return;
          if(scope === 'dh'){
            entry.dh[key] = e.target.value;
            if(key === 'finalPaid'){ entry.finalPaidAt = dhAllFinalPaid(entry) ? Date.now() : null; }
          } else if(scope === 'tmw'){
            const idx = +e.target.dataset.refidx;
            entry.tmw.waitings[idx][key] = e.target.value;
            if(key === 'finalPaid'){ entry.finalPaidAt = tmwAllFinalPaid(entry) ? Date.now() : null; }
          }
          saveEntries();
          toast('Updated');
          render();
        };
      });
      app.querySelectorAll('[data-dh-pay]').forEach(sel=>{
        sel.onchange = e=>{
          const id = e.target.dataset.dhPay, key = e.target.dataset.dhKey;
          const entry = entries.find(en=>en.id === id);
          if(!entry || !entry.dh) return;
          entry.dh[key] = e.target.value;
          entry[key] = e.target.value;
          if(key === 'finalPaid'){
            entry.finalPaidAt = dhAllFinalPaid(entry) ? Date.now() : null;
          }
          saveEntries();
          toast('Updated');
          render();
        };
      });
      app.querySelectorAll('[data-demurrage]').forEach(sel=>{
        sel.onchange = e=>{
          const id = e.target.dataset.demurrage, di = +e.target.dataset.didx, key = e.target.dataset.dkey;
          const entry = entries.find(en=>en.id===id);
          if(!entry || !entry.dh.demurrages) return;
          entry.dh.demurrages[di][key] = e.target.value;
          if(key === 'finalPaid'){
            entry.finalPaidAt = dhAllFinalPaid(entry) ? Date.now() : null;
          }
          saveEntries();
          toast('Updated');
          render();
        };
      });
      app.querySelectorAll('[data-comment-id]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.commentId;
          const scope = e.currentTarget.dataset.commentScope;
          const idx = e.currentTarget.dataset.commentIdx !== undefined ? +e.currentTarget.dataset.commentIdx : null;
          const entry = entries.find(en=>en.id===id);
          if(!entry) return;
          let current = '';
          if(scope === 'entry') current = entry.comment || '';
          else if(scope === 'dh') current = entry.dh.comment || '';
          else if(scope === 'demurrage') current = (entry.dh.demurrages[idx]||{}).comment || '';
          else if(scope === 'waiting') current = (entry.tmw.waitings[idx]||{}).comment || '';
          commentModal = { id, scope, idx, text: current };
          render();
        };
      });
    } else if(view === 'rates'){
      const rSite = $('#rate_site'), rRate = $('#rate_value');
      if(rSite){ rSite.oninput = e=>{ rateForm.site = e.target.value.toUpperCase(); e.target.value = rateForm.site; }; }
      if(rRate) rRate.oninput = e=> rateForm.rate = e.target.value;

      const saveRateBtn = $('#save_rate');
      if(saveRateBtn) saveRateBtn.onclick = onSaveRate;

      // Inline edit inputs
      const inlineSite = $('#inline_rate_site'), inlineRate = $('#inline_rate_value');
      if(inlineSite){ inlineSite.oninput = e=>{ rateForm.site = e.target.value.toUpperCase(); e.target.value = rateForm.site; }; }
      if(inlineRate) inlineRate.oninput = e=> rateForm.rate = e.target.value;
      const inlineSaveBtn = $('#inline_save_rate');
      if(inlineSaveBtn) inlineSaveBtn.onclick = onSaveRate;
      const inlineCancelBtn = $('#inline_cancel_rate');
      if(inlineCancelBtn) inlineCancelBtn.onclick = ()=>{ editingRateId=null; rateForm={site:'',rate:''}; render(); };

      app.querySelectorAll('[data-edit-rate]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.editRate;
          const r = rates.find(x=>x.id === id);
          if(r){ editingRateId = id; rateForm = { site: r.site, rate: r.rate }; render(); }
        };
      });
      app.querySelectorAll('[data-del-rate]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.delRate;
          confirmModal('Delete this site rate?', ()=>{
            const idx = rates.findIndex(r=>r.id === id);
            if(idx === -1) return;
            const removed = rates[idx];
            rates.splice(idx, 1);
            saveRates();
            render();
            undoToast('Rate deleted', ()=>{
              rates.splice(idx, 0, removed);
              saveRates();
              render();
            });
          });
        };
      });
    } else if(view === 'fuel'){
      const fTruck = $('#fuel_truck');
      if(fTruck) fTruck.oninput = e=> fuelForm.truck = e.target.value;

      app.querySelectorAll('[data-pin-input]').forEach(inp=>{
        inp.oninput = e=>{
          const i = +e.target.dataset.pinInput;
          fuelForm.pins[i] = e.target.value;
        };
      });

      const addPinBtn = $('#add_pin');
      if(addPinBtn) addPinBtn.onclick = ()=>{ fuelForm.pins.push(''); render(); };

      app.querySelectorAll('[data-remove-pin]').forEach(btn=>{
        btn.onclick = e=>{
          const i = +e.currentTarget.dataset.removePin;
          fuelForm.pins.splice(i,1);
          if(fuelForm.pins.length === 0) fuelForm.pins = [''];
          render();
        };
      });

      const saveFuelBtn = $('#save_fuel');
      if(saveFuelBtn) saveFuelBtn.onclick = onSaveFuel;

      const cancelFuelBtn = $('#cancel_fuel');
      if(cancelFuelBtn) cancelFuelBtn.onclick = ()=>{ editingFuelId=null; fuelForm={truck:'',pins:['']}; render(); };

      app.querySelectorAll('[data-edit-fuel]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.editFuel;
          const f = fuelPins.find(x=>x.id===id);
          if(f){ editingFuelId=id; fuelForm={truck:f.truck, pins:[...f.pins]}; render(); }
        };
      });

      app.querySelectorAll('[data-del-fuel]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.delFuel;
          confirmModal('Delete this truck\'s fuel pins?', ()=>{
            const idx = fuelPins.findIndex(f=>f.id===id);
            if(idx===-1) return;
            const removed = fuelPins[idx];
            fuelPins.splice(idx,1);
            saveFuelPins();
            render();
            undoToast('Fuel pins deleted', ()=>{ fuelPins.splice(idx,0,removed); saveFuelPins(); render(); });
          });
        };
      });
    } else if(view === 'deleted'){
      app.querySelector('#trash_tab_auto')?.addEventListener('click', ()=>{ trashSubTab='auto'; render(); });
      app.querySelector('#trash_tab_user')?.addEventListener('click', ()=>{ trashSubTab='user'; render(); });
      app.querySelectorAll('[data-restore]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.restore;
          const idx = deletedEntries.findIndex(en=>en.id===id);
          if(idx===-1) return;
          const entry = {...deletedEntries[idx]};
          delete entry.deletedAt;
          delete entry.deleteReason;
          deletedEntries.splice(idx,1);
          entries.push(entry);
          saveEntries();
          saveDeletedEntries();
          toast('Entry restored');
          render();
        };
      });
      app.querySelectorAll('[data-perm-del]').forEach(btn=>{
        btn.onclick = e=>{
          const id = e.currentTarget.dataset.permDel;
          confirmModal('Permanently delete this entry? This cannot be undone.', ()=>{
            deletedEntries = deletedEntries.filter(en=>en.id!==id);
            saveDeletedEntries();
            render();
          });
        };
      });
      const emptyTrashBtn = $('#empty_trash');
      if(emptyTrashBtn) emptyTrashBtn.onclick = ()=>{
        const count = deletedEntries.filter(e=>e.deleteReason===trashSubTab).length;
        const label = trashSubTab==='auto' ? 'Auto-Deleted After Pay' : 'User Deleted';
        confirmModal(`Permanently delete all ${count} items in "${label}"?`, ()=>{
          deletedEntries = deletedEntries.filter(e=>e.deleteReason!==trashSubTab);
          saveDeletedEntries();
          render();
        });
      };
    }
    if(view==='data'){
      const exportAllBtn = $('#export_all');
      if(exportAllBtn) exportAllBtn.onclick = exportAll;
      const importAllFile = $('#import_all_file');
      if(importAllFile) importAllFile.onchange = e=>{ const f=e.target.files[0]; if(f) importAll(f); e.target.value=''; };

      const ghSave = $('#gh_save_settings');
      if(ghSave) ghSave.onclick = ()=>{
        const u = $('#gh_user')?.value.trim();
        const r = $('#gh_repo')?.value.trim();
        const t = $('#gh_token')?.value.trim();
        if(!u||!r||!t){ toast('Fill in all three GitHub fields'); return; }
        localStorage.setItem('worklog:gh_user', u);
        localStorage.setItem('worklog:gh_repo', r);
        localStorage.setItem('worklog:gh_token', t);
        _ghSha = null; // reset SHA cache on credential change
        toast('GitHub settings saved');
        render();
      };
      const ghBackup = $('#gh_backup');
      if(ghBackup) ghBackup.onclick = githubBackup;
      const ghRestore = $('#gh_restore');
      if(ghRestore) ghRestore.onclick = githubRestore;

      app.querySelectorAll('[data-access-user]').forEach(cb=>{
        cb.addEventListener('change', async ()=>{
          const uid = cb.getAttribute('data-access-user');
          const feature = cb.getAttribute('data-access-feature');
          const checked = cb.checked;
          const entry = userAccessList && userAccessList.find(u=>u.userId===uid);
          if(!entry) return;
          const prevAccess = { ...entry.access };
          entry.access = { ...entry.access, [feature]: checked };
          cb.disabled = true;
          try{
            await fbSetDoc(`users/${uid}`, { access: entry.access });
            toast(`Updated access for ${entry.displayName}`);
          }catch(err){
            entry.access = prevAccess; // revert cache on failure
            cb.checked = !checked;
            toast('Failed to update access: '+err.message);
          }
          cb.disabled = false;
        });
      });
    }
  }

  function renderDeleted(){
    purgeOldDeleted();
    // Backward compatibility: entries deleted before this feature existed have no deleteReason
    deletedEntries.forEach(e=>{ if(!e.deleteReason) e.deleteReason = 'user'; });

    const autoCount = deletedEntries.filter(e=>e.deleteReason==='auto').length;
    const userCount = deletedEntries.filter(e=>e.deleteReason==='user').length;

    let html = `<div class="trash-info">Items are permanently deleted 30 days after being moved to Trash.</div>`;
    html += `<div class="tabs" style="margin-bottom:14px;">
      <div class="tab ${trashSubTab==='auto'?'active':''}" id="trash_tab_auto">Auto-Deleted After Pay${autoCount?` (${autoCount})`:''}</div>
      <div class="tab ${trashSubTab==='user'?'active':''}" id="trash_tab_user">User Deleted${userCount?` (${userCount})`:''}</div>
    </div>`;

    const visible = deletedEntries.filter(e=>e.deleteReason === trashSubTab);

    if(!visible.length){
      html += `<div class="card"><div class="empty">${trashSubTab==='auto' ? 'No auto-deleted entries.' : 'No user-deleted entries.'}</div></div>`;
      return html;
    }

    html += `<button class="btn ghost" id="empty_trash" style="width:100%;margin-bottom:14px;color:var(--rust);border-color:var(--rust);">Empty This Tab (${visible.length} items)</button>`;

    const sorted = [...visible].sort((a,b)=>b.deletedAt-a.deletedAt);
    const groups = {};
    sorted.forEach(e=>{ if(!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });

    Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
      const dObj = new Date(date+'T00:00:00');
      const niceDate = dObj.toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      html += `<div class="card"><h2 class="datehdr"><span>${esc(niceDate)}</span></h2>`;
      groups[date].forEach(e=>{
        const badge = e.type==='DH'?`<span class="badge dh">DH</span>`:`<span class="badge tmw">TMW</span>`;
        const number = e.type==='DH'?e.dh.number:e.tmw.number;
        const site = e.type==='TMW'?`<span class="logsite">${esc((e.tmw.site||'').toUpperCase())}</span>`:'';
        const countdown = daysLeftDeleteLabel(e.deletedAt);
        const urgent = (THIRTY_DAYS_MS-(Date.now()-e.deletedAt)) < 3*24*60*60*1000;
        html += `<div class="logrow">
          <div class="logrow-head">
            ${badge} <span class="lognum">${esc(number)}</span>
            ${site}
            <span class="logtruck">Truck ${esc(e.truck)}</span>
          </div>
          <div class="trash-countdown ${urgent?'urgent':''}">${esc(countdown)}</div>`;

        if(e.type==='DH' && e.dh.claimed){
          html += `<div class="claimrow">
            <div class="claimrow-top">
              <span class="claimtime">${esc(claimedDisplay(e.dh.claimed))}</span>
              <span class="claimkind">${esc(e.dh.reason)||'Deadhead'}</span>
              <span class="claimref">Ref: ${esc(e.dh.ref)||'&mdash;'}</span>
            </div>
          </div>`;
        }
        if(e.type==='TMW' && e.tmw.waitings.length){
          e.tmw.waitings.forEach(w=>{
            html += `<div class="claimrow">
              <div class="claimrow-top">
                <span class="claimtime">${esc(claimedDisplay(w.claimed))||'&mdash;'}</span>
                <span class="claimkind">${esc(w.kind)||'&mdash;'}</span>
                <span class="claimref">Ref: ${esc(w.ref)||'&mdash;'}</span>
              </div>
            </div>`;
          });
        }
        html += `<div class="trash-actions">
          <button class="btn ghost" style="font-size:12px;padding:7px 12px;" data-restore="${e.id}">Restore</button>
          <button class="delbtn" data-perm-del="${e.id}">Delete Permanently</button>
        </div></div>`;
      });
      html += `</div>`;
    });
    return html;
  }

  function onSaveFuel(){
    const truck = fuelForm.truck.trim();
    const pins = fuelForm.pins.map(p=>p.trim()).filter(p=>p);
    if(!truck){ toast('Enter a truck number'); return; }
    if(!pins.length){ toast('Enter at least one fuel pin'); return; }
    const dup = fuelPins.find(f=>f.truck.trim().toLowerCase()===truck.toLowerCase() && f.id!==editingFuelId);
    if(dup){ toast('This truck already has fuel pins \u2014 edit it instead'); return; }
    if(editingFuelId){
      const f = fuelPins.find(x=>x.id===editingFuelId);
      if(f){ f.truck=truck; f.pins=pins; }
    } else {
      fuelPins.push({ id:'fp_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), truck, pins });
    }
    saveFuelPins();
    toast(editingFuelId ? 'Fuel pins updated' : 'Fuel pins saved');
    editingFuelId=null;
    fuelForm={truck:'',pins:['']};
    render();
  }

  function renderAccessDenied(label){
    return `<div class="card" style="text-align:center;padding:36px 20px;">
      <div style="font-size:32px;margin-bottom:10px;opacity:.5;">🔒</div>
      <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;">You don't have access to ${esc(label)}</div>
      <div style="font-size:13px;color:var(--muted);">Please contact your admin to request access.</div>
    </div>`;
  }

  function renderFuelPins(){
    if(!hasAccess('fuelPins')) return renderAccessDenied('Fuel Pins');
    let adminBanner = '';
    if(isAdmin()){
      adminBanner = `<div class="card" style="background:#eaf1ea;border:1px solid var(--moss);margin-bottom:14px;"><div style="font-size:12px;font-weight:700;color:var(--moss);">👑 Admin mode</div><div style="font-size:12px;color:var(--ink);margin-top:4px;">Changes you make here are published for every user.</div></div>`;
    } else {
      adminBanner = `<div class="card" style="background:#f4f2ea;border:1px solid var(--line);margin-bottom:14px;"><div style="font-size:12px;color:var(--muted);">Fuel pins shown here include the shared list kept up to date by the admin account. Anything you add or edit below is saved to your account only.</div></div>`;
    }
    // Find last used truck from entries
    const lastTruck = (()=>{
      if(!entries.length) return null;
      const sorted = [...entries].sort((a,b)=> b.created - a.created);
      return sorted[0].truck;
    })();
    const lastTruckPin = lastTruck ? fuelPins.find(fp => fp.truck.trim().toLowerCase() === lastTruck.trim().toLowerCase()) : null;

    let html = adminBanner;
    if(lastTruck){
      html += `<div class="card" style="margin-bottom:14px;">
        <h2 style="margin-bottom:10px;">Last Used Truck</h2>
        <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;">
          <div>
            <div class="fuel-pin-label">Truck Last Used</div>
            <div style="font-size:20px;font-weight:800;color:var(--ink);margin-top:2px;">${esc(lastTruck)}</div>
          </div>
          <div>
            <div class="fuel-pin-label">Fuel Pin${lastTruckPin && lastTruckPin.pins.filter(Boolean).length>1?'s':''}</div>
            ${lastTruckPin && lastTruckPin.pins.filter(Boolean).length
              ? lastTruckPin.pins.filter(Boolean).map(p=>`<div style="font-size:20px;font-weight:800;color:var(--amber);margin-top:2px;letter-spacing:.06em;">${esc(p)}</div>`).join('')
              : `<div style="font-size:14px;color:var(--muted);margin-top:4px;">No pin saved for this truck</div>`
            }
          </div>
        </div>
      </div>`;
    }

    if(!editingFuelId){
      html += `<div class="card"><h2>Add Fuel Pins</h2>`;
      html += `<div class="row single">`;
      html += field('Truck Number', `<input type="text" id="fuel_truck" placeholder="e.g. 1320" value="${esc(fuelForm.truck)}">`);
      html += `</div>`;
      fuelForm.pins.forEach((pin,i)=>{
        html += `<div class="row single fuel-pin-row">
          <div class="field" style="position:relative;">
            <label>Pin ${i+1}</label>
            <input type="text" data-pin-input="${i}" placeholder="Enter fuel pin" value="${esc(pin)}" style="padding-right:${fuelForm.pins.length>1?'50px':'12px'}">
            ${fuelForm.pins.length>1 ? `<button class="pin-remove" data-remove-pin="${i}">&times;</button>` : ''}
          </div>
        </div>`;
      });
      html += `<button class="btn add" id="add_pin" style="margin-bottom:12px;">+ Add Another Pin</button>`;
      html += `<div class="btnrow">
        <button class="btn primary" id="save_fuel">Save Fuel Pins</button>
      </div></div>`;
    }

    if(!fuelPins.length){
      html += `<div class="card"><div class="empty">No fuel pins saved yet.</div></div>`;
      return html;
    }

    const sorted = [...fuelPins].sort((a,b)=>a.truck.localeCompare(b.truck,undefined,{numeric:true}));

    // Find max pins count for column headers
    const maxPins = Math.max(...sorted.map(f=>f.pins.filter(Boolean).length), 1);

    // If editing, show inline edit form above table
    if(editingFuelId){
      const f = sorted.find(x=>x.id===editingFuelId);
      html += `<div class="card" style="margin-bottom:14px;"><h2>Edit Fuel Pins — Truck ${esc(fuelForm.truck)}</h2>`;
      fuelForm.pins.forEach((pin,i)=>{
        html += `<div class="row single fuel-pin-row" style="margin-bottom:8px;">
          <div class="field" style="position:relative;">
            <label>Pin ${i+1}</label>
            <input type="text" data-pin-input="${i}" placeholder="Enter fuel pin" value="${esc(pin)}" style="padding-right:${fuelForm.pins.length>1?'50px':'12px'}">
            ${fuelForm.pins.length>1 ? `<button class="pin-remove" data-remove-pin="${i}">&times;</button>` : ''}
          </div>
        </div>`;
      });
      html += `<button class="btn add" id="add_pin" style="margin-bottom:10px;font-size:12px;padding:8px 12px;">+ Add Pin</button>`;
      html += `<div class="btnrow" style="margin-top:0;">
        <button class="btn primary" id="save_fuel" style="flex:none;padding:10px 18px;">Update</button>
        <button class="btn ghost" id="cancel_fuel">Cancel</button>
      </div></div>`;
    }

    // Excel-style table
    html += `<div class="card" style="padding:0;overflow:hidden;">
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:320px;">
          <thead>
            <tr style="background:var(--ink);">
              <th style="text-align:left;padding:10px 12px;color:var(--paper);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;border-right:1px solid rgba(255,255,255,.15);width:80px;">#</th>
              <th style="text-align:left;padding:10px 12px;color:var(--paper);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;border-right:1px solid rgba(255,255,255,.15);">Truck</th>
              ${Array.from({length:maxPins},(_,i)=>`<th style="text-align:left;padding:10px 12px;color:var(--paper);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;border-right:1px solid rgba(255,255,255,.15);">Pin ${maxPins>1?i+1:''}</th>`).join('')}

  function onSaveRate(){
    const site = rateForm.site.trim().toUpperCase();
    const rateVal = rateForm.rate.trim();
    if(!site || !rateVal){ toast('Enter site name and rate'); return; }
    if(editingRateId){
      const r = rates.find(x=>x.id === editingRateId);
      if(r){ r.site = site; r.rate = rateVal; }
    } else {
      const dup = rates.find(r=>r.site.trim().toLowerCase() === site.toLowerCase());
      if(dup){ toast('Site already has a rate \u2014 edit it instead'); return; }
      rates.push({ id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2,7), site, rate: rateVal });
    }
    saveRates();
    toast(editingRateId ? 'Rate updated' : 'Rate added');
    editingRateId = null;
    rateForm = { site:'', rate:'' };
    render();
  }

  function fmt24ts(ts){

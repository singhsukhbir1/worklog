  function exportAll(){
    const stamp = new Date().toISOString().slice(0,10);
    // Section 1: Log entries
    const entryHeaders = ['__section__','Date','Truck','Type','Number','Site/Reason','Kind of Waiting','Claimed Time','Reference Number','Real Pay','Final Paid','Start','End','Comments'];
    const entryRows = [entryHeaders];
    const sorted = [...entries].sort((a,b)=> a.date.localeCompare(b.date) || a.created - b.created);
    sorted.forEach(e=>{
      if(e.type === 'DH'){
        entryRows.push(['entries', e.date, e.truck, 'Deadhead', e.dh.number, e.dh.reason||'', '', e.dh.claimed||'', e.dh.ref||'', e.realPay, e.finalPaid, e.dh.start||'', e.dh.end||'', e.dh.comment||'']);
        (e.dh.demurrages||[]).forEach(d=>{
          entryRows.push(['entries', e.date, e.truck, 'Demurrage', e.dh.number, d.reason||'', '', d.claimed||'', d.ref||'', d.realPay||'No', d.finalPaid||'No', d.start||'', d.end||'', d.comment||'']);
        });
      } else {
        if(e.tmw.waitings.length){
          e.tmw.waitings.forEach(w=>{
            entryRows.push(['entries', e.date, e.truck, 'TMW', e.tmw.number, e.tmw.site, w.kind||'', w.claimed||'', w.ref||'', e.realPay, e.finalPaid, w.start||'', w.end||'', w.comment||'']);
          });
        } else {
          entryRows.push(['entries', e.date, e.truck, 'TMW', e.tmw.number, e.tmw.site, '', '', '', e.realPay, e.finalPaid, '', '', e.comment||'']);
        }
      }
    });

    // Section 2: Rates
    const rateHeaders = ['__section__','Site Name','Pay Rate','','','','','','','',''];
    const rateRows = [rateHeaders];
    [...rates].sort((a,b)=>a.site.localeCompare(b.site)).forEach(r=>{
      rateRows.push(['rates', r.site, r.rate, '', '', '', '', '', '', '', '']);
    });

    // Section 3: Fuel pins
    const fuelHeaders = ['__section__','Truck','Pin','','','','','','','',''];
    const fuelRows = [fuelHeaders];
    [...fuelPins].sort((a,b)=>a.truck.localeCompare(b.truck,undefined,{numeric:true})).forEach(f=>{
      f.pins.filter(Boolean).forEach(p=>{
        fuelRows.push(['fuel', f.truck, p, '', '', '', '', '', '', '', '']);
      });
    });

    // Combine with blank separator rows
    const allRows = [
      ...entryRows,
      ['','','','','','','','','','',''],
      ...rateRows,
      ['','','','','','','','','','',''],
      ...fuelRows
    ];

    const csv = allRows.map(r => r.map(csvCell).join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `worklog_all_${stamp}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    lastExportTs = Date.now();
    try{ localStorage.setItem('worklog:lastExport', String(lastExportTs)); }catch(e){}
    toast('All data exported');
    render();
  }

  function buildBackupPayload(){
    // Build a full JSON snapshot of all data
    return JSON.stringify({
      version: 1,
      exportedAt: new Date().toISOString(),
      entries,
      rates,
      fuelPins,
      deletedEntries
    }, null, 2);
  }

  let _ghSha = null; // cache SHA to avoid extra GET calls

  async function autoBackup(){
    const user  = localStorage.getItem('worklog:gh_user')||'';
    const repo  = localStorage.getItem('worklog:gh_repo')||'';
    const token = localStorage.getItem('worklog:gh_token')||'';
    if(!user||!repo||!token) return; // not configured, skip silently
    try {
      const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/worklog-backup.json`;
      const content = btoa(unescape(encodeURIComponent(buildBackupPayload())));
      if(!_ghSha){
        const chk = await fetch(apiUrl, { headers:{ 'Authorization':`token ${token}`, 'Accept':'application/vnd.github.v3+json' } });
        if(chk.ok){ const f = await chk.json(); _ghSha = f.sha; }
      }
      const body = { message:`Auto-backup ${new Date().toISOString().slice(0,10)}`, content };
      if(_ghSha) body.sha = _ghSha;
      const res = await fetch(apiUrl, {
        method:'PUT',
        headers:{ 'Authorization':`token ${token}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });
      if(res.ok){
        const data = await res.json();
        _ghSha = data.content?.sha || null;
        localStorage.setItem('worklog:gh_last_backup', new Date().toISOString());
      }
    } catch(e){ /* silent fail */ }
  }

  async function githubBackup(){
    const user  = localStorage.getItem('worklog:gh_user')||'';
    const repo  = localStorage.getItem('worklog:gh_repo')||'';
    const token = localStorage.getItem('worklog:gh_token')||'';
    if(!user||!repo||!token){ toast('GitHub not configured — enter details in Data tab'); return; }
    toast('Backing up to GitHub…');
    const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/worklog-backup.json`;
    const content = btoa(unescape(encodeURIComponent(buildBackupPayload())));
    try {
      let sha = _ghSha;
      if(!sha){
        const chk = await fetch(apiUrl, { headers:{ 'Authorization':`token ${token}`, 'Accept':'application/vnd.github.v3+json' } });
        if(chk.ok){ const f = await chk.json(); sha = f.sha; }
      }
      const body = { message:`Backup ${new Date().toISOString().slice(0,10)}`, content };
      if(sha) body.sha = sha;
      const res = await fetch(apiUrl, {
        method:'PUT',
        headers:{ 'Authorization':`token ${token}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });
      if(res.ok){
        const data = await res.json();
        _ghSha = data.content?.sha || null;
        localStorage.setItem('worklog:gh_last_backup', new Date().toISOString());
        toast('✓ Backed up to GitHub');
        render();
      } else {
        const err = await res.json();
        toast('Backup failed: ' + (err.message||res.status));
      }
    } catch(e){ toast('Backup failed: ' + e.message); }
  }

  async function githubRestore(){
    const user  = localStorage.getItem('worklog:gh_user')||'';
    const repo  = localStorage.getItem('worklog:gh_repo')||'';
    const token = localStorage.getItem('worklog:gh_token')||'';
    if(!user||!repo||!token){ toast('GitHub not configured — enter details in Data tab'); return; }
    if(!confirm('Restore from GitHub? This will replace all current data with the latest backup.')) return;
    toast('Fetching backup from GitHub…');
    const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/worklog-backup.json`;
    try {
      const res = await fetch(apiUrl, {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if(!res.ok){ toast('No backup found on GitHub'); return; }
      const file = await res.json();
      _ghSha = file.sha;
      const json = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g,'')))));
      if(json.entries) { entries = json.entries; saveEntries(); }
      if(json.rates) { rates = json.rates; saveRates(); }
      if(json.fuelPins) { fuelPins = json.fuelPins; saveFuelPins(); }
      if(json.deletedEntries) { deletedEntries = json.deletedEntries; saveDeletedEntries(); }
      toast('✓ Data restored from GitHub');
      render();
    } catch(e){ toast('Restore failed: ' + e.message); }
  }

  function parseCSV(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for(let i=0; i<text.length; i++){
      const c = text[i], next = text[i+1];
      if(inQuotes){
        if(c === '"' && next === '"'){ field += '"'; i++; }
        else if(c === '"'){ inQuotes = false; }
        else field += c;
      } else {
        if(c === '"'){ inQuotes = true; }
        else if(c === ','){ row.push(field); field=''; }
        else if(c === '\r'){ /* skip */ }
        else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else field += c;
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(r => r.length > 1 || (r.length===1 && r[0] !== ''));
  }

  function importAll(file){
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const rows = parseCSV(reader.result);
        if(!rows.length){ toast('CSV file is empty'); return; }

        // Detect sections by __section__ column
        let entriesAdded=0, entriesReplaced=0, ratesAdded=0, ratesReplaced=0, fuelAdded=0, fuelReplaced=0;

        // Find header rows for each section
        let entryHeaderIdx = -1, rateHeaderIdx = -1, fuelHeaderIdx = -1;
        rows.forEach((r, i)=>{
          const first = (r[0]||'').trim().toLowerCase();
          if(first === '__section__'){
            const second = (r[1]||'').trim().toLowerCase();
            if(second === 'date') entryHeaderIdx = i;
            else if(second === 'site name') rateHeaderIdx = i;
            else if(second === 'truck') fuelHeaderIdx = i;
          }
        });

        if(entryHeaderIdx === -1 && rateHeaderIdx === -1 && fuelHeaderIdx === -1){
          toast('Format not recognized — use a file exported from this app');
          return;
        }

        // Helper: get rows belonging to a section (between its header and next header/end)
        function getSectionRows(headerIdx){
          if(headerIdx === -1) return [];
          const result = [];
          for(let i = headerIdx+1; i < rows.length; i++){
            const first = (rows[i][0]||'').trim().toLowerCase();
            if(first === '__section__') break;
            if(rows[i].every(c=>!c.trim())) continue; // skip blank
            result.push(rows[i]);
          }
          return result;
        }

        // --- Import entries ---
        if(entryHeaderIdx > -1){
          const hdr = rows[entryHeaderIdx].map(h=>h.trim().toLowerCase());
          const idx = {
            section: 0,
            date: hdr.indexOf('date'),
            truck: hdr.indexOf('truck'),
            type: hdr.indexOf('type'),
            number: hdr.indexOf('number'),
            site: hdr.indexOf('site/reason'),
            kind: hdr.indexOf('kind of waiting'),
            claimed: hdr.indexOf('claimed time'),
            ref: hdr.indexOf('reference number'),
            realPay: hdr.indexOf('real pay'),
            finalPaid: hdr.indexOf('final paid'),
            start: hdr.indexOf('start'),
            end: hdr.indexOf('end'),
            comments: hdr.indexOf('comments')
          };
          const dataRows = getSectionRows(entryHeaderIdx).filter(r=>(r[idx.section]||'').trim().toLowerCase()==='entries');
          const groups = new Map();
          const activeDHKey = new Map(); // base key -> currently-active DH group key (for attaching demurrage rows)
          const dhSeen = new Map(); // base key -> count of actual Deadhead rows seen so far
          dataRows.forEach(r=>{
            if(!r[idx.date]) return;
            const type = (r[idx.type]||'').trim();
            const isDemurrage = /demurrage/i.test(type);
            const isActualDeadhead = /^deadhead$/i.test(type);
            const isDH = /deadhead/i.test(type) || isDemurrage;
            const ref = idx.ref>-1 ? (r[idx.ref]||'') : '';
            // Demurrage rows belong to the same DH entry as the Deadhead row with the same date/truck/number
            const baseKey = isDH
              ? [r[idx.date], r[idx.truck], 'DH', r[idx.number]].join('|||')
              : [r[idx.date], r[idx.truck], 'TMW', r[idx.number]].join('|||');
            let key = baseKey;
            if(isDH){
              if(isActualDeadhead){
                // A real Deadhead row: if we've already seen one for this date/truck/number,
                // this is a separate trip that happens to reuse the same number — give it its own group.
                const n = (dhSeen.get(baseKey)||0) + 1;
                dhSeen.set(baseKey, n);
                key = n>1 ? baseKey+'|||'+n : baseKey;
                activeDHKey.set(baseKey, key);
              } else {
                // Demurrage row: attach to whichever Deadhead group is currently active for this base key
                key = activeDHKey.get(baseKey) || baseKey;
              }
            }
            if(!groups.has(key)){
              groups.set(key, {
                date: r[idx.date], truck: r[idx.truck], type: isDH?'DH':'TMW', number: r[idx.number], ref,
                site: idx.site>-1 ? r[idx.site] : '',
                realPay: idx.realPay>-1 && r[idx.realPay] ? r[idx.realPay] : 'No',
                finalPaid: idx.finalPaid>-1 && r[idx.finalPaid] ? r[idx.finalPaid] : 'No',
                rows: []
              });
            }
            groups.get(key).rows.push(r);
          });
          function dupKey(date, truck, type, number, ref){
            return type==='DH'
              ? [String(date).trim(), String(truck).trim().toLowerCase(), 'DH', String(number).trim().toLowerCase(), String(ref||'').trim().toLowerCase()].join('|||')
              : [String(date).trim(), String(truck).trim().toLowerCase(), 'TMW', String(number).trim().toLowerCase()].join('|||');
          }
          function findExistingIdx(date, truck, type, number, ref){
            const key = dupKey(date, truck, type, number, ref);
            return entries.findIndex(en=>{
              const n = en.type==='DH' ? en.dh.number : en.tmw.number;
              const r = en.type==='DH' ? en.dh.ref : '';
              return dupKey(en.date, en.truck, en.type, n, r) === key;
            });
          }
          let ic = 0;
          groups.forEach(g=>{
            // For DH groups, separate the Deadhead row from Demurrage rows
            const deadheadRow = g.type==='DH' ? g.rows.find(r=>/^deadhead$/i.test((r[idx.type]||'').trim())) : null;
            const demurrageRows = g.type==='DH' ? g.rows.filter(r=>/demurrage/i.test((r[idx.type]||'').trim())) : [];
            const firstRow = deadheadRow || g.rows[0];
            let entry;
            if(g.type==='DH'){
              entry = {
                id:'e_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
                created: Date.now(), date: g.date, truck: g.truck, type:'DH',
                dh:{
                  number: g.number,
                  start: idx.start>-1 ? (firstRow[idx.start]||'') : '',
                  end: idx.end>-1 ? (firstRow[idx.end]||'') : '',
                  reason: idx.site>-1 ? firstRow[idx.site]:'',
                  ref: idx.ref>-1 ? firstRow[idx.ref]:'',
                  claimed: idx.claimed>-1 ? firstRow[idx.claimed]:'',
                  comment: idx.comments>-1 ? (firstRow[idx.comments]||'') : '',
                  realPay: g.realPay,
                  finalPaid: g.finalPaid,
                  demurrages: demurrageRows.map(r=>({
                    reason: idx.site>-1 ? (r[idx.site]||'') : '',
                    start: idx.start>-1 ? (r[idx.start]||'') : '',
                    end: idx.end>-1 ? (r[idx.end]||'') : '',
                    claimed: idx.claimed>-1 ? (r[idx.claimed]||'') : '',
                    ref: idx.ref>-1 ? (r[idx.ref]||'') : '',
                    realPay: idx.realPay>-1 && r[idx.realPay] ? r[idx.realPay] : 'No',
                    finalPaid: idx.finalPaid>-1 && r[idx.finalPaid] ? r[idx.finalPaid] : 'No',
                    comment: idx.comments>-1 ? (r[idx.comments]||'') : ''
                  }))
                },
                tmw:null, realPay:g.realPay, finalPaid:g.finalPaid,
                finalPaidAt: null
              };
              entry.finalPaidAt = dhAllFinalPaid(entry) ? Date.now() : null;
            } else {
              const waitings = g.rows.filter(r=>(idx.kind>-1&&r[idx.kind])||(idx.claimed>-1&&r[idx.claimed])||(idx.ref>-1&&r[idx.ref])).map(r=>({
                kind: idx.kind>-1?r[idx.kind]:'', claimed: idx.claimed>-1?r[idx.claimed]:'', ref: idx.ref>-1?r[idx.ref]:'',
                comments: idx.comments>-1?(r[idx.comments]||''):'',
                comment: idx.comments>-1?(r[idx.comments]||''):'',
                start: idx.start>-1?(r[idx.start]||''):'',
                end: idx.end>-1?(r[idx.end]||''):'',
                realPay:g.realPay, finalPaid:g.finalPaid
              }));
              entry = {
                id:'e_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'_'+ic,
                created: Date.now(), date: g.date, truck: g.truck, type:'TMW',
                dh:null, tmw:{ number: g.number, site: g.site, waitings },
                realPay:g.realPay, finalPaid:g.finalPaid,
                comment: idx.comments>-1 ? (firstRow[idx.comments]||'') : '',
                finalPaidAt: g.finalPaid==='Yes' ? Date.now() : null
              };
            }
            const xi = findExistingIdx(g.date, g.truck, g.type, g.number, g.ref);
            if(xi>-1){ entry.id=entries[xi].id; entry.created=entries[xi].created; entries[xi]=entry; entriesReplaced++; }
            else { entries.push(entry); entriesAdded++; }
            ic++;
          });
          if(entriesAdded||entriesReplaced) saveEntries();
        }

        // --- Import rates ---
        if(rateHeaderIdx > -1){
          const hdr = rows[rateHeaderIdx].map(h=>h.trim().toLowerCase());
          const siteIdx = hdr.indexOf('site name');
          const rateIdx = hdr.indexOf('pay rate');
          if(siteIdx>-1 && rateIdx>-1){
            getSectionRows(rateHeaderIdx).forEach(r=>{
              const site = (r[siteIdx]||'').trim().toUpperCase();
              const rate = (r[rateIdx]||'').trim();
              if(!site||!rate) return;
              const xi = rates.findIndex(x=>x.site.trim().toLowerCase()===site.toLowerCase());
              if(xi>-1){ rates[xi].rate=rate; ratesReplaced++; }
              else { rates.push({id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), site, rate}); ratesAdded++; }
            });
            if(ratesAdded||ratesReplaced) saveRates();
          }
        }

        // --- Import fuel pins ---
        if(fuelHeaderIdx > -1){
          const hdr = rows[fuelHeaderIdx].map(h=>h.trim().toLowerCase());
          const truckIdx = hdr.indexOf('truck');
          const pinIdx = hdr.indexOf('pin');
          if(truckIdx>-1 && pinIdx>-1){
            const pinGroups = new Map();
            getSectionRows(fuelHeaderIdx).forEach(r=>{
              const truck = (r[truckIdx]||'').trim();
              const pin = (r[pinIdx]||'').trim();
              if(!truck) return;
              if(!pinGroups.has(truck)) pinGroups.set(truck, []);
              if(pin) pinGroups.get(truck).push(pin);
            });
            pinGroups.forEach((pins, truck)=>{
              const xi = fuelPins.findIndex(f=>f.truck.trim().toLowerCase()===truck.toLowerCase());
              if(xi>-1){ fuelPins[xi].pins=pins; fuelReplaced++; }
              else { fuelPins.push({id:'fp_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), truck, pins}); fuelAdded++; }
            });
            if(fuelAdded||fuelReplaced) saveFuelPins();
          }
        }

        lastImportTs = Date.now();
        try{ localStorage.setItem('worklog:lastImport', String(lastImportTs)); }catch(e){}

        const parts = [];
        if(entriesAdded||entriesReplaced) parts.push(`Entries: ${entriesAdded} added, ${entriesReplaced} updated`);
        if(ratesAdded||ratesReplaced) parts.push(`Rates: ${ratesAdded} added, ${ratesReplaced} updated`);
        if(fuelAdded||fuelReplaced) parts.push(`Fuel pins: ${fuelAdded} added, ${fuelReplaced} updated`);
        toast(parts.length ? `Import done — ${parts.join(' · ')}` : 'Nothing new to import');
        view = 'data';
        render();
      }catch(err){
        console.error(err);
        toast('Could not read CSV file');
      }
    };
    reader.readAsText(file);
  }

  function csvCell(v){
    const s = String(v===undefined||v===null ? '' : v);
    if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
    return s;
  }

    }

      if(!/^\d{7}$/.test(form.tmw.number.trim())){ toast('TMW number must be exactly 7 digits — please check it'); return; }

    }

    const entry = {
      id: existing ? existing.id : 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      created: existing ? existing.created : Date.now(),
      date: form.date,
      truck: form.truck,
      type: form.type,
      dh: form.type==='DH' ? {...form.dh, claimed: calcClaimedValue(form.dh.start, form.dh.end)||form.dh.claimed, demurrages: (form.dh.demurrages||[]).map(d=>({...d}))} : null,
      tmw: form.type==='TMW' ? { number: form.tmw.number, site: form.tmw.site.toUpperCase(), waitings: form.tmw.waitings.map(w=>({...w})) } : null,
      realPay: existing ? existing.realPay : 'No',
      finalPaid: existing ? existing.finalPaid : 'No'
    };
    if(existing){
      const idx = entries.findIndex(en=>en.id === existing.id);
      entries[idx] = entry;
    } else {
      entries.push(entry);
    }
    saveEntries();
    toast(existing ? 'Entry updated' : 'Entry saved');
    editingId = null;
    form = blankForm();
    view = 'log';
    render();
  }

  // ── Bootstrap ─────────────────────────────────────────────────────────────
  async function boot(){
    // Check for existing session
    const session = loadSession();
    if(session && session.userId && !session.isGuest){
      currentUser = { userId: session.userId, displayName: session.displayName, access: { rates:true, fuelPins:true } };
      // Refresh access permissions from Firestore on every launch (not just full login)
      // so an admin-set restriction takes effect the next time this user opens the app.
      if(firebaseReady){
        try {
          const userDoc = await fbGetDoc(`users/${session.userId}`);
          if(userDoc) currentUser.access = userDoc.access || { rates:true, fuelPins:true };
        } catch(e){ /* stay permissive if this lookup fails */ }
      }
      // Load cloud data, then persist it to localStorage before loadEntries() runs.
      // loadEntries() always reads entries/rates/fuelPins/deletedEntries fresh from
      // localStorage (merging rates/fuelPins with the baked-in/global base) — without
      // this step it would silently discard whatever fbLoadFromCloud() just fetched,
      // e.g. showing an empty log or missing personal rate customizations on a fresh
      // device. We write directly to localStorage rather than calling saveEntries()/
      // saveRates()/etc. so a normal app launch doesn't also trigger an unnecessary
      // extra Firestore write + GitHub auto-backup push every single time.
      const hasCloud = await fbLoadFromCloud();
      if(hasCloud){
        const localEntries = (() => { try{ return JSON.parse(localStorage.getItem('worklog:entries')||'[]'); }catch(e){ return []; } })();
        let entriesChanged = false;
        localEntries.forEach(le => {
          if(!entries.some(e=>e.id===le.id)){ entries.push(le); entriesChanged = true; }
        });
        try{ localStorage.setItem('worklog:entries', JSON.stringify(entries)); }catch(e){}
        try{ if(rates.length) localStorage.setItem('worklog:rates', JSON.stringify(rates)); }catch(e){}
        try{ if(fuelPins.length) localStorage.setItem('worklog:fuelpins', JSON.stringify(fuelPins)); }catch(e){}
        try{ localStorage.setItem('worklog:deleted', JSON.stringify(deletedEntries)); }catch(e){}
        // Only push back to the cloud/GitHub if we actually found local-only entries
        // (e.g. added while offline) that the cloud copy didn't have yet.
        if(entriesChanged){ autoBackup(); fbSyncToCloud(); }
      }
      loadEntries();
    } else {
      // Show auth screen immediately (no session)
      renderApp();
    }
  }

  // Wait for Firebase SDK to be ready then boot
  // ES modules run after regular scripts, so we poll instead of relying on the event
  function waitForFirebase(){
    if(window.__wlDB){
      firebaseReady = true;
      syncPendingReg();
      boot();
      return;
    }

    let booted = false;
    function doBoot(online){
      if(booted) return;
      booted = true;
      clearInterval(interval);
      firebaseReady = online;
      if(online) syncPendingReg();
      boot();
    }

    document.getElementById('app').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px;padding:40px;text-align:center;">
        <div style="font-size:28px;">🔌</div>
        <div style="font-size:16px;color:#666;font-weight:600;">Connecting to server…</div>
        <div style="font-size:12px;color:#aaa;">This usually takes a moment</div>
        <button id="btn_skip_connect" style="margin-top:10px;padding:12px 24px;background:#1c2b2d;color:#f6f4ee;border:none;border-radius:6px;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;">
          Continue Without Sync
        </button>
      </div>`;

    document.getElementById('btn_skip_connect')?.addEventListener('click', ()=> doBoot(false));

    const interval = setInterval(()=>{
      if(window.__wlDB) doBoot(true);
    }, 50);

    // Auto-boot after 2 seconds regardless
    setTimeout(()=> doBoot(false), 2000);
  }
  waitForFirebase();

})();

  // ---- 24hr time input masking ----
  function attach24hrInputs(root){
    (root || document).querySelectorAll('input[placeholder="HH:MM"]').forEach(input=>{
      if(input._24hr) return;
      input._24hr = true;

      input.addEventListener('keydown', function(e){
        if(e.key === 'Backspace' && this.value.endsWith(':')) {
          this.value = this.value.slice(0,-1);
          e.preventDefault();
        }
      });

      input.addEventListener('input', function(e){
        let v = this.value.replace(/[^0-9]/g,'');
        if(v.length > 4) v = v.slice(0,4);
        let out = '';
        if(v.length >= 3){
          let h = v.slice(0,2), m = v.slice(2,4);
          if(parseInt(h,10) > 23) h = '23';
          if(m.length === 2 && parseInt(m,10) > 59) m = '59';
          out = h + ':' + m;
        } else if(v.length === 2){
          let h = v;
          if(parseInt(h,10) > 23) h = '23';
          out = h + ':';
        } else {
          out = v;
        }
        const atEnd = this.selectionStart >= this.value.length;
        this.value = out;
        if(atEnd) this.setSelectionRange(out.length, out.length);

        // Auto-advance only when exactly 4 digits entered (complete HH:MM)
        if(v.length === 4 && /^\d{2}:\d{2}$/.test(out)){
          const allInputs = Array.from((root || document).querySelectorAll(
            'input:not([disabled]):not([type="hidden"]):not([style*="display:none"]), select:not([disabled]), textarea:not([disabled])'
          ));
          const idx = allInputs.indexOf(this);
          if(idx > -1 && allInputs[idx+1]){
            allInputs[idx+1].focus();
          }
        }
      });
    });
  }

</script>
